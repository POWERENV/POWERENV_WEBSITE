<body>
    <section id="power" class="view">
        <div class="grid">
            <div class="card col-span-12">
                <h3 style="margin:0 0 12px 0">Power Controls</h3>
                <p class="muted small">Select a device from Hardware panel to perform power actions.</p>

                <div style="display:flex;gap:12px;margin-top:14px">
                    <button class="btn" onclick="performPower('reboot')">Reboot</button>
                    <button class="btn-ghost" onclick="performPower('shutdown')">Shutdown</button>
                    <button class="btn-ghost" onclick="performPower('powercycle')">Power Cycle</button>
                </div>
            </div>
        </div>
    </section>
</body>
